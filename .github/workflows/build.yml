name: Build ShopTrack APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Create Flutter project scaffold
        run: flutter create --project-name shoptrack shoptrack_build

      - name: Copy app source files into project
        run: |
          cp lib/main.dart shoptrack_build/lib/main.dart
          cp pubspec.yaml shoptrack_build/pubspec.yaml

      - name: Install dependencies
        working-directory: shoptrack_build
        run: flutter pub get

      - name: Build release APK
        working-directory: shoptrack_build
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ShopTrack-release-apk
          path: shoptrack_build/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
